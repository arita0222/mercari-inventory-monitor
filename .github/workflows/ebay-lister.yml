name: eBay出品ドラフト作成

on:
  workflow_dispatch:
    inputs:
      source_url:
        description: 'フリマ商品URL'
        required: true
        type: string
      publish:
        description: '実際にeBayに出品する（falseなら検証のみ）'
        required: false
        type: boolean
        default: false
      exchange_rate:
        description: '為替レート（円/USD）'
        required: false
        type: string
        default: '150'

jobs:
  create-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome をインストール
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: eBay出品ドラフト作成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          EBAY_AUTH_TOKEN: ${{ secrets.EBAY_AUTH_TOKEN }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          ARGS="${{ github.event.inputs.source_url }}"
          if [ "${{ github.event.inputs.publish }}" = "true" ]; then
            ARGS="$ARGS --publish"
          fi
          ARGS="$ARGS --rate ${{ github.event.inputs.exchange_rate }}"
          python ebay_lister.py $ARGS
