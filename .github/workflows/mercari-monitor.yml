name: フリマ売り切れ検知

on:
  schedule:
    # 毎日 朝6時（JST） = UTC 21:00（前日）
    - cron: '0 21 * * *'
    # 毎日 夜9時（JST） = UTC 12:00
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      test_url:
        description: 'テスト用URL（指定するとそのURLのみチェック）'
        required: false
        type: string
        default: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome をインストール
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 依存ライブラリをインストール
        run: pip install -r requirements.txt

      - name: 売り切れ検知を実行
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          EBAY_APP_ID: ${{ secrets.EBAY_APP_ID }}
          EBAY_CERT_ID: ${{ secrets.EBAY_CERT_ID }}
          EBAY_DEV_ID: ${{ secrets.EBAY_DEV_ID }}
          EBAY_AUTH_TOKEN: ${{ secrets.EBAY_AUTH_TOKEN }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          TEST_URL: ${{ github.event.inputs.test_url }}
        run: python mercari_monitor.py

  keepalive:
    name: 自動停止防止（keepalive）
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: スケジュール実行を再有効化して60日カウントをリセット
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/mercari-monitor.yml/enable"
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/ebay_check.yml/enable"
          echo "✅ keepalive完了: 両ワークフローの自動停止タイマーをリセットしました"
