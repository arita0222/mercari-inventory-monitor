name: Mercari Inventory Monitor

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-mercari:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium gspread google-auth-oauthlib google-auth-httplib2 google-cloud-logging
      
      - name: Create service account key
        run: |
          echo '${{ secrets.SERVICE_ACCOUNT_KEY }}' > service-account-key.json
      
      - name: Run Mercari monitor
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.GMAIL_ADDRESS }}
        run: python mercari_monitor.py
